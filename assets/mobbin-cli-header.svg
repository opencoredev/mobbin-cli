<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mobbin CLI unofficial README banner</title>
  <desc id="desc">A dark abstract README header for Mobbin CLI with UI reference cards and command-line search motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="116" y1="52" x2="1480" y2="623" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050609"/>
      <stop offset="0.46" stop-color="#080B12"/>
      <stop offset="1" stop-color="#010203"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1176 184) rotate(138.5) scale(510 354)">
      <stop stop-color="#4F8DFF" stop-opacity="0.44"/>
      <stop offset="0.58" stop-color="#236CFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#050609" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(425 439) rotate(-29.6) scale(505 300)">
      <stop stop-color="#7EFFCE" stop-opacity="0.28"/>
      <stop offset="0.62" stop-color="#43E5AA" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#050609" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="274" y1="122" x2="1311" y2="564" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171A22"/>
      <stop offset="1" stop-color="#07080D"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="270" y1="89" x2="1326" y2="581" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.26"/>
      <stop offset="0.46" stop-color="#74A7FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#B7FFDF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="beam" x1="374" y1="408" x2="1258" y2="193" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7EFFCE" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#7EFFCE" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#4F8DFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="534" y1="281" x2="1067" y2="348" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#ECF2FF"/>
      <stop offset="1" stop-color="#BDEDDC"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-25%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.52"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
    <clipPath id="mainClip">
      <rect x="186" y="80" width="1228" height="480" rx="42"/>
    </clipPath>
  </defs>

  <rect width="1600" height="640" fill="url(#bg)"/>
  <rect width="1600" height="640" fill="url(#grid)"/>
  <rect width="1600" height="640" fill="url(#blueGlow)"/>
  <rect width="1600" height="640" fill="url(#mintGlow)"/>

  <g opacity="0.42">
    <path d="M135 536C361 421 504 558 682 393C831 255 1021 287 1244 126C1360 42 1462 50 1536 74" stroke="#4F8DFF" stroke-opacity="0.34" stroke-width="1.4"/>
    <path d="M74 439C263 366 427 433 571 333C757 204 938 251 1118 149C1240 80 1376 89 1502 126" stroke="#7EFFCE" stroke-opacity="0.18" stroke-width="1.2"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="186" y="80" width="1228" height="480" rx="42" fill="url(#panel)" fill-opacity="0.84"/>
    <rect x="186.75" y="80.75" width="1226.5" height="478.5" rx="41.25" stroke="url(#panelStroke)" stroke-width="1.5"/>
  </g>

  <g clip-path="url(#mainClip)">
    <rect x="186" y="80" width="1228" height="480" fill="#05070C" fill-opacity="0.26"/>
    <path d="M168 443L1438 136" stroke="url(#beam)" stroke-width="105" stroke-linecap="round" opacity="0.2"/>
    <path d="M276 496L1346 236" stroke="url(#beam)" stroke-width="22" stroke-linecap="round" opacity="0.34"/>

    <g opacity="0.9">
      <rect x="271" y="136" width="276" height="178" rx="22" fill="#0E1118" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <rect x="297" y="164" width="70" height="16" rx="8" fill="#7EFFCE" fill-opacity="0.72"/>
      <rect x="297" y="198" width="201" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="297" y="224" width="152" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.1"/>
      <rect x="297" y="260" width="84" height="28" rx="14" fill="#4F8DFF" fill-opacity="0.2" stroke="#4F8DFF" stroke-opacity="0.32"/>
    </g>

    <g opacity="0.8">
      <rect x="1095" y="132" width="232" height="146" rx="22" fill="#0E1118" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="1131" cy="168" r="10" fill="#7EFFCE" fill-opacity="0.68"/>
      <rect x="1156" y="160" width="114" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.2"/>
      <rect x="1130" y="200" width="156" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.1"/>
      <rect x="1130" y="224" width="126" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.08"/>
    </g>

    <g opacity="0.72">
      <rect x="245" y="392" width="304" height="118" rx="22" fill="#070A10" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <text x="279" y="438" fill="#9FE8CF" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="0">$</text>
      <text x="315" y="438" fill="#E8EEF9" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="0">mobbin search</text>
      <rect x="280" y="462" width="214" height="10" rx="5" fill="#4F8DFF" fill-opacity="0.3"/>
      <rect x="280" y="482" width="162" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.09"/>
    </g>

    <g opacity="0.64">
      <rect x="1038" y="390" width="316" height="134" rx="24" fill="#0A0D14" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <rect x="1069" y="420" width="66" height="66" rx="16" fill="#152034" stroke="#4F8DFF" stroke-opacity="0.28"/>
      <rect x="1157" y="425" width="132" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="1157" y="453" width="95" height="12" rx="6" fill="#7EFFCE" fill-opacity="0.28"/>
      <rect x="1157" y="481" width="153" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.08"/>
    </g>
  </g>

  <g>
    <rect x="236" y="116" width="166" height="42" rx="21" fill="#0A0D12" fill-opacity="0.82" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="260" y="143" fill="#E6FDF5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="650" letter-spacing="0">* unofficial</text>
  </g>

  <g filter="url(#textShadow)">
    <text x="800" y="327" text-anchor="middle" fill="#F8FAFC" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="112" font-weight="820" letter-spacing="0">Mobbin CLI</text>
    <text x="1081" y="269" fill="#7EFFCE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="800" letter-spacing="0">*</text>
    <text x="800" y="376" text-anchor="middle" fill="#A9B1C0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="520" letter-spacing="0">visual search for agents, screens, flows, and product references</text>
  </g>

  <g opacity="0.55">
    <circle cx="1352" cy="120" r="2.5" fill="#7EFFCE"/>
    <circle cx="1292" cy="540" r="2" fill="#4F8DFF"/>
    <circle cx="219" cy="529" r="2" fill="#7EFFCE"/>
    <circle cx="481" cy="101" r="1.8" fill="#FFFFFF"/>
    <circle cx="1469" cy="324" r="1.8" fill="#FFFFFF"/>
  </g>
</svg>
